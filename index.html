<body>
  <!-- 滚动进度条 -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- 加载屏幕 -->
  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-logo">CupGIS</div>
      <div class="loader-track"><div class="loader-fill" id="loaderFill"></div></div>
      <div class="loader-meta">
        <span class="loader-percent" id="loaderPercent">0%</span>
        <span class="loader-text" id="loaderText" data-i18n="loading.scene">构建 3D 场景</span>
      </div>
    </div>
  </div>

  <!-- 顶部导航 -->
  <nav class="nav" id="nav">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" aria-label="CupGIS Home">
        <svg class="nav-logo-mark" viewBox="0 0 64 64" width="30" height="30" aria-hidden="true">
          <circle cx="32" cy="32" r="15" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="32" cy="32" rx="26" ry="9" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35" transform="rotate(-22 32 32)"/>
          <circle cx="53" cy="22" r="2.5" fill="currentColor" transform="rotate(-22 32 32)"/>
        </svg>
        <span class="nav-logo-text">CupGIS</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="#data" class="nav-link" data-i18n="nav.data">数据</a>
        <a href="#tools" class="nav-link" data-i18n="nav.tools">工具</a>
        <a href="#products" class="nav-link" data-i18n="nav.products">产品</a>
        <a href="#cases" class="nav-link" data-i18n="nav.cases">案例</a>
        <a href="#blog" class="nav-link" data-i18n="nav.blog">博客</a>
        <a href="#about" class="nav-link" data-i18n="nav.about">关于</a>
      </div>
      <div class="nav-actions">
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span class="lang-current" id="langCurrent">EN</span>
        </button>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Three.js 画布（首屏 3D 地球背景，滚动后淡出） -->
  <canvas id="threeCanvas" class="three-canvas" aria-hidden="true"></canvas>

  <!-- 主内容 -->
  <main class="main" id="mainContent">

    <!-- 首屏 Hero：3D 地球 + 极简文字 -->
    <section class="hero" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-inner">
        <span class="hero-badge" data-i18n="hero.badge">Geospatial Intelligence Platform</span>
        <h1 class="hero-title">CupGIS</h1>
        <p class="hero-slogan" data-i18n="hero.slogan">开启地理空间智能新纪元</p>
        <p class="hero-desc" data-i18n="hero.desc">从近地轨道俯瞰，重新定义地理信息系统的边界。集数据索引、在线工具、产品矩阵、应用案例与技术博客于一体。</p>
        <div class="hero-actions">
          <a href="#data" class="btn btn-primary" data-i18n="hero.cta1">开始探索</a>
          <a href="#about" class="btn btn-ghost" data-i18n="hero.cta2">了解更多</a>
        </div>
      </div>
      <div class="hero-scroll">
        <span data-i18n="hero.scroll">向下滚动探索</span>
        <span class="hero-scroll-line"></span>
      </div>
    </section>

    <!-- 模块区（JS 渲染，深浅交替半屏模块） -->
    <div id="moduleSections"></div>

    <footer class="footer" id="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <div class="footer-logo">CupGIS</div>
          <p class="footer-desc" data-i18n="footer.desc">开启地理空间智能新纪元</p>
        </div>
        <div class="footer-links">
          <div class="footer-col">
            <h4 data-i18n="footer.platform">平台</h4>
            <a href="#data" data-i18n="nav.data">数据</a>
            <a href="#tools" data-i18n="nav.tools">工具</a>
            <a href="#products" data-i18n="nav.products">产品</a>
          </div>
          <div class="footer-col">
            <h4 data-i18n="footer.resources">资源</h4>
            <a href="#cases" data-i18n="nav.cases">案例</a>
            <a href="#blog" data-i18n="nav.blog">博客</a>
            <a href="#about" data-i18n="nav.about">关于</a>
          </div>
          <div class="footer-col">
            <h4 data-i18n="footer.connect">联系</h4>
            <a href="https://github.com/cupgis" target="_blank" rel="noopener">GitHub</a>
            <a href="mailto:contact@cupgis.com">Email</a>
            <a href="https://twitter.com/CupGIS" target="_blank" rel="noopener">Twitter</a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2025 CupGIS. <span data-i18n="footer.rights">保留所有权利。</span></p>
      </div>
    </footer>
